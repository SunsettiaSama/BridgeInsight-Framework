# config.yaml
# 交叉验证配置
cross_validation:
  k_folds: 5

# 数据加载配置
data:
  batch_size: 16
  drop_last: True
  data_dir: ""
  img_dir: ""

# 训练配置
training:
  num_epochs: 20
  device: auto  # auto表示自动判断cuda/cpu，也可手动指定"cuda"/"cpu"
  model_save_interval: 10  # 每N轮保存一次模型

# 优化器配置
optimizer:
  type: Adam
  lr: 0.0001

# 模型配置
model:
  img_size: 512
  num_classes: 3

# 路径配置
paths:
  tensorboard_log_dir: /root/tf-logs/
  model_save_dir: ./models/Adam/