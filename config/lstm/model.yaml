# LSTM 模型配置文件
# 适配输入：(B, seq_len, input_size) 时序数据（如VIV数据集时序模式输出）

# --------------------------
# 基础网络配置（与任务/输入匹配）
# --------------------------
network_type: "lstm"
in_channels: 1  # 时序任务可保留，与SimpleCNN体系统一（实际用input_size）
input_size: 16  # 时序数据特征维度（必填，核心参数）
num_classes: 3  # 输出维度：分类=类别数；序列任务=每步输出特征数
task_type: "classification"  # 可选：classification/seq2seq/seq2fixed

# --------------------------
# Seq2Fixed任务专属配置（其他任务可忽略）
# --------------------------
predict_seq_len: 4  # seq2fixed任务必填，指定预测步数

# --------------------------
# LSTM核心层配置
# --------------------------
hidden_size: 64  # 隐藏层维度
num_layers: 2    # 网络层数
bidirectional: false  # 是否双向LSTM
dropout: 0.1     # 层间dropout（仅num_layers>1时生效）
batch_first: true  # 输入形状为(batch, seq_len, input_size)
seq_dropout: 0.1   # 序列任务通用dropout

# --------------------------
# 任务专属Dropout配置
# --------------------------
classifier_dropout: 0.2  # 分类任务专属
seq2fixed_dropout: 0.1   # seq2fixed任务专属

# --------------------------
# 预训练配置（与项目体系统一）
# --------------------------
pretrained: false
pretrained_path: null