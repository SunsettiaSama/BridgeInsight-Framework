# SimpleCNN 模型配置文件
# 适配输入：(B, 1, 50, 60) 类灰度图像（VIV数据集网格模式输出）
# --------------------------
# 基础配置（必须与输入/任务匹配）
# --------------------------
# 输入通道数：1（类灰度图，单通道）
in_channels: 1
# 类别数：根据实际任务修改（示例为5分类，可按需调整）
num_classes: 3
# 输入尺寸：严格对应数据集输出 (H, W) = (50, 60)，防止尺寸不匹配
input_size: [50, 60]
# 输出尺寸：分割任务需指定（与输入一致），分类任务可忽略（自动输出类别维度）
output_size: null
# 任务类型：classification（分类，默认）/ segmentation（分割）
task_type: "classification"

# --------------------------
# 编码器配置（核心特征提取模块）
# 设计思路：空洞卷积递增感受野 + 通道数递增提取高层特征 + 保持尺寸不变
# --------------------------
encoder:
  # 特征通道数：逐层翻倍（16→32→64），轻量化设计，避免过参数化
  # 长度对应编码器块数量（3个编码块，逐层提升特征表达能力）
  feature_channels: [16, 32, 64]
  # 卷积核尺寸：3×3（经典尺寸，平衡感受野与计算量）
  kernel_size: 3
  # 步长：1（保持输入输出尺寸一致，避免分辨率丢失）
  stride: 1
  # 填充：1（对应kernel_size=3，stride=1，保证尺寸不变；空洞卷积时自动适配padding=(kernel-1)*dilation//2）
  padding: 1
  # 空洞率基数：2（编码块i的空洞率=2^i，逐层扩大感受野，无需下采样）
  dilation_base: 2

# --------------------------
# 解码器配置（特征恢复与融合模块）
# 设计思路：上采样恢复尺寸 + 通道数递减与编码器对称 + 残差连接缓解梯度消失
# --------------------------
decoder:
  # 上采样倍数：1（编码器未下采样，尺寸保持50×60，无需放大；若编码器stride=2，可设为2）
  upsample_scale: 1
  # 卷积核尺寸：3×3（与编码器一致，保证特征融合的平滑性）
  kernel_size: 3
  # 填充：1（对应kernel_size=3，stride=1，保持尺寸不变）
  padding: 1

# --------------------------
# Dropout 配置（正则化，防止过拟合）
# --------------------------
dropout:
  # 是否启用Dropout：true（轻量化模型建议启用，降低过拟合风险）
  enable: true
  # Dropout概率：0.2（不宜过高，避免特征丢失过多）
  prob: 0.2

# --------------------------
# 残差连接配置（提升训练稳定性）
# --------------------------
residual:
  # 是否启用残差连接：true（缓解深层网络梯度消失，提升特征复用能力）
  enable: false